<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#151a21"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b6a0ff"/>
      <stop offset="100%" stop-color="#00e3fd"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Stylized "CV" letterform -->
  <text x="256" y="310" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="260" fill="url(#accent)" letter-spacing="-15">CV</text>
  <!-- Subtle bottom accent line -->
  <rect x="128" y="380" width="256" height="6" rx="3" fill="url(#accent)" opacity="0.4"/>
</svg>
